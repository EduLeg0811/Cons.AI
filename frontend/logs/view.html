<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logs Viewer</title>
  <style>
    :root {
      --bg: #f8f5ef;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --text: #3f3a34;
      --muted: #7a7067;
      --line: rgba(111, 98, 84, 0.15);
      --shadow: 0 22px 48px rgba(126, 110, 91, 0.12);
      --peach: #f8ddd2;
      --mint: #dceee1;
      --sky: #dbeaf5;
      --butter: #f5eac6;
      --lilac: #e7def6;
      --rose: #f4dde3;
      --accent: #7d9880;
      --accent-soft: rgba(125, 152, 128, 0.16);
      --danger: #b56d6d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.92), transparent 25%),
        radial-gradient(circle at top right, rgba(249,223,210,0.9), transparent 20%),
        linear-gradient(180deg, #fbf7f1 0%, #f4eee7 100%);
    }

    .shell {
      width: min(100vw - 20px, 3200px);
      margin: 0 auto;
      padding: 12px 8px 18px;
    }

    .hero,
    .toolbar,
    .metric,
    .visit,
    .empty,
    .list-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 16px 20px;
      margin-bottom: 10px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,248,240,0.78)),
        var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(440px, 2.3fr) repeat(4, minmax(160px, 240px));
      gap: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .field,
    .button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      color: var(--text);
      font: inherit;
    }

    .button {
      cursor: pointer;
      background: linear-gradient(180deg, #fcfbf8, #f1ece3);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(126,110,91,0.1);
    }

    .button.danger {
      color: var(--danger);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .metric {
      padding: 14px 16px;
      min-height: 96px;
    }

    .metric:nth-child(1) { background: linear-gradient(180deg, rgba(248,221,210,0.96), rgba(255,255,255,0.86)); }
    .metric:nth-child(2) { background: linear-gradient(180deg, rgba(220,238,225,0.96), rgba(255,255,255,0.86)); }
    .metric:nth-child(3) { background: linear-gradient(180deg, rgba(219,234,245,0.96), rgba(255,255,255,0.86)); }
    .metric:nth-child(4) { background: linear-gradient(180deg, rgba(245,234,198,0.96), rgba(255,255,255,0.86)); }
    .metric:nth-child(5) { background: linear-gradient(180deg, rgba(231,222,246,0.96), rgba(255,255,255,0.86)); }

    .metric-label {
      display: block;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(70, 61, 52, 0.72);
    }

    .metric-value {
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 5px;
    }

    .metric-note {
      font-size: 12px;
      color: var(--muted);
    }

    .list-panel {
      padding: 0;
      overflow: hidden;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 10px;
    }

    .list-copy {
      color: var(--muted);
      font-size: 12px;
    }

    .visit-wrap {
      display: grid;
      gap: 10px;
      padding: 0 10px 10px;
      max-height: 82vh;
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    .visit {
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(251,247,240,0.82)),
        var(--panel);
    }

    .visit summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
    }

    .visit summary::-webkit-details-marker {
      display: none;
    }

    .visit-header {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(220px, 0.9fr) minmax(0, 1fr) minmax(0, 1.2fr);
      gap: 10px;
      align-items: start;
    }

    .visit-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .visit-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .visit-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #4d6350;
      font-size: 11px;
      font-weight: 700;
    }

    .visit-meta,
    .visit-pages,
    .visit-inputs {
      min-width: 0;
    }

    .visit-highlights {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 0 14px 12px;
    }

    .highlight-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      background: var(--panel-strong);
      min-height: 96px;
    }

    .highlight-card.question { background: linear-gradient(180deg, rgba(219,234,245,0.95), rgba(255,255,255,0.9)); }
    .highlight-card.answer { background: linear-gradient(180deg, rgba(220,238,225,0.95), rgba(255,255,255,0.9)); }
    .highlight-card.params { background: linear-gradient(180deg, rgba(245,234,198,0.95), rgba(255,255,255,0.9)); }
    .highlight-card.findings { background: linear-gradient(180deg, rgba(231,222,246,0.95), rgba(255,255,255,0.9)); }
    .highlight-card.idle { opacity: 0.72; }

    .highlight-title {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .highlight-content {
      font-size: 12px;
      line-height: 1.35;
      color: #564f48;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .section-label {
      display: block;
      margin-bottom: 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      font-size: 11px;
      color: #5a534c;
      max-width: 100%;
    }

    .visit-inputs .preview {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
      font-size: 12px;
      line-height: 1.35;
      color: #5a534c;
      background: rgba(255,255,255,0.74);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .timeline {
      border-top: 1px solid var(--line);
      padding: 6px 10px 10px;
      background: rgba(255,255,255,0.42);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1640px;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    tbody td {
      padding: 9px 12px;
      border-top: 1px solid rgba(121,111,100,0.1);
      font-size: 13px;
      vertical-align: top;
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.55);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(121,111,100,0.12);
      background: rgba(255,255,255,0.8);
    }

    .pill.view {
      background: rgba(220,238,225,0.96);
    }

    .pill.access {
      background: rgba(219,234,245,0.96);
    }

    .pill.config {
      background: rgba(245,234,198,0.98);
    }

    .pill.clean {
      background: rgba(244,221,227,0.98);
    }

    .info-button {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.84);
      color: #7e7469;
      cursor: pointer;
      font-size: 12px;
      transition: transform 120ms ease, background 120ms ease, color 120ms ease;
    }

    .info-button.has-extra {
      background: rgba(125, 152, 128, 0.14);
      color: #4d6350;
    }

    .info-button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.96);
    }

    .info-button.active {
      background: #4d6350;
      color: white;
      border-color: #4d6350;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 11px;
    }

    .content-cell {
      max-width: 520px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 1500px) {
      .toolbar,
      .metrics {
        grid-template-columns: 1fr 1fr;
      }

      .visit-header {
        grid-template-columns: 1fr 1fr;
      }

      .visit-highlights {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 960px) {
      .shell {
        width: calc(100vw - 18px);
      }

      .toolbar,
      .metrics,
      .visit-header,
      .visit-highlights {
        grid-template-columns: 1fr;
      }

      .visit-wrap {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Painel de acessos</h1>
      <p class="subtitle">Visualizacao por visitas de usuario. Cada bloco agrupa uma navegacao continua e separa retornos posteriores.</p>
    </section>

    <section class="toolbar">
      <input id="searchInput" class="field" type="text" placeholder="Filtrar por usuario, pagina, modulo, conteudo, local ou IP">
      <select id="typeFilter" class="field">
        <option value="all">Tudo</option>
        <option value="page_view">Paginas vistas</option>
        <option value="feature_access">Acessos a funcionalidade</option>
        <option value="module_access">Cliques de modulo</option>
      </select>
      <select id="limitFilter" class="field">
        <option value="200">200 registros</option>
        <option value="400">400 registros</option>
        <option value="800" selected>800 registros</option>
        <option value="1200">1200 registros</option>
      </select>
      <select id="gapFilter" class="field">
        <option value="15">Nova visita: 15 min</option>
        <option value="30" selected>Nova visita: 30 min</option>
        <option value="60">Nova visita: 60 min</option>
      </select>
      <button id="refreshButton" class="button" type="button">Atualizar</button>
      <button id="clearButton" class="button danger" type="button">Limpar tudo</button>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="list-panel">
      <div class="list-head">
        <div>
          <strong>Visitas agrupadas</strong>
          <div class="list-copy" id="listCopy">Carregando...</div>
        </div>
      </div>
      <div class="visit-wrap" id="visitWrap"></div>
    </section>
  </main>

  <script>
    const state = {
      records: [],
      summary: null,
      limit: 800,
      gapMinutes: 30,
      filter: '',
      type: 'all',
      selectedRecordId: '',
    };

    const el = {
      metrics: document.getElementById('metrics'),
      visitWrap: document.getElementById('visitWrap'),
      listCopy: document.getElementById('listCopy'),
      searchInput: document.getElementById('searchInput'),
      typeFilter: document.getElementById('typeFilter'),
      limitFilter: document.getElementById('limitFilter'),
      gapFilter: document.getElementById('gapFilter'),
      refreshButton: document.getElementById('refreshButton'),
      clearButton: document.getElementById('clearButton'),
    };

    function safeText(value) {
      return value === undefined || value === null ? '' : String(value);
    }

    function escapeHtml(value) {
      return safeText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value, withDate = true) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return safeText(value);
      return new Intl.DateTimeFormat('pt-BR', {
        day: withDate ? '2-digit' : undefined,
        month: withDate ? '2-digit' : undefined,
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

    function locationText(record) {
      const geo = record._geo || {};
      return [geo.city, geo.region, geo.country].filter(Boolean).join(', ');
    }

    function eventLabel(record) {
      if (record.event === 'page_view') return 'Pagina vista';
      if (record.event === 'module_access') return 'Modulo aberto';
      if (record.event === 'feature_access') return record.label || 'Acesso';
      return record.label || record.event || 'Registro';
    }

    function eventTypeLabel(record) {
      if (record.action === 'save_config') return 'Config';
      if (record.action === 'new_conversation') return 'Clean';
      if (record.event === 'page_view') return 'Visualizacao';
      return 'Acesso';
    }

    function eventTypeClass(record) {
      if (record.action === 'save_config') return 'config';
      if (record.action === 'new_conversation') return 'clean';
      if (record.event === 'page_view') return 'view';
      return 'access';
    }

    function normalizeUserKey(record) {
      return [
        safeText(record.session_id || 'no-session'),
        safeText(record._client_ip || 'no-ip')
      ].join('|');
    }

    function normalizeUserLabel(record) {
      if (record._client_ip) return `Usuario ${record._client_ip}`;
      if (record.session_id) return `Sessao ${record.session_id.slice(0, 10)}`;
      return 'Usuario sem identificacao';
    }

    function uniqueValues(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function stringifyMetaValue(value) {
      if (value === undefined || value === null || value === '') return '';
      if (Array.isArray(value)) return value.map(item => safeText(item)).filter(Boolean).join(', ');
      if (typeof value === 'object') return JSON.stringify(value);
      return safeText(value);
    }

    function recordId(record) {
      return [
        safeText(record._server_ts),
        safeText(record.event),
        safeText(record.module),
        safeText(record.page),
        safeText(record.value)
      ].join('|');
    }

    function hasExtraInfo(record) {
      if (!record) return false;
      const meta = record.meta;
      return Boolean(
        safeText(record.value).trim() ||
        (meta && typeof meta === 'object' && Object.keys(meta).length)
      );
    }

    function summarizeMeta(meta) {
      if (!meta || typeof meta !== 'object') return [];
      const preferredKeys = [
        'selected_sources',
        'sources',
        'style',
        'max_results',
        'group_results',
        'source_count',
        'results_count',
        'books_count',
        'pages_count',
        'titles_count',
        'limit_status'
      ];
      return preferredKeys
        .filter(key => meta[key] !== undefined && meta[key] !== null && meta[key] !== '')
        .map(key => `${key}: ${stringifyMetaValue(meta[key])}`);
    }

    function buildCountsSummary(meta) {
      const counts = meta?.counts_by_source;
      if (!counts || typeof counts !== 'object') return '';
      return Object.entries(counts)
        .map(([source, count]) => `${source}: ${count}`)
        .join('\n');
    }

    function filteredRecords() {
      const text = state.filter.toLowerCase();
      return state.records
        .filter(record => {
          const isHomePage = record.page === '/' || record.page === '/index.html' || record.page_label === 'Página Inicial' || record.page_label === 'Pagina Inicial';
          if (isHomePage && record.event === 'page_view') return false;
          if (isHomePage && record.event === 'module_access') return false;
          if (state.type !== 'all' && record.event !== state.type) return false;
          if (!text) return true;
          const blob = [
            record.label,
            record.value,
            record.page_label,
            record.page,
            record.module,
            record.action,
            locationText(record),
            record._client_ip,
            record.session_id,
          ].map(safeText).join(' ').toLowerCase();
          return blob.includes(text);
        })
        .sort((a, b) => {
          const ta = Date.parse(a._server_ts || 0) || 0;
          const tb = Date.parse(b._server_ts || 0) || 0;
          return ta - tb;
        });
    }

    function buildVisits(records) {
      const visits = [];
      const gapMs = state.gapMinutes * 60 * 1000;

      for (const record of records) {
        const ts = Date.parse(record._server_ts || 0) || 0;
        const userKey = normalizeUserKey(record);
        const lastVisit = visits.length ? visits[visits.length - 1] : null;
        const sameUser = lastVisit && lastVisit.userKey === userKey;
        const sameWindow = sameUser && (ts - lastVisit.lastTs <= gapMs);

        if (sameWindow) {
          lastVisit.records.push(record);
          lastVisit.lastTs = ts;
          continue;
        }

        visits.push({
          id: `${userKey}-${ts}-${visits.length}`,
          userKey,
          records: [record],
          firstTs: ts,
          lastTs: ts,
        });
      }

      return visits.reverse().map((visit, index) => decorateVisit(visit, index === 0));
    }

    function decorateVisit(visit, openByDefault) {
      const records = visit.records.slice().sort((a, b) => {
        const ta = Date.parse(a._server_ts || 0) || 0;
        const tb = Date.parse(b._server_ts || 0) || 0;
        return tb - ta;
      });
      const chronologicalRecords = visit.records.slice().sort((a, b) => {
        const ta = Date.parse(a._server_ts || 0) || 0;
        const tb = Date.parse(b._server_ts || 0) || 0;
        return ta - tb;
      });
      const first = chronologicalRecords[0] || {};
      const last = records[0] || {};
      const pages = uniqueValues(records.map(record => record.page_label || record.page));
      const modules = uniqueValues(records.map(record => record.module || eventLabel(record)));
      const inputs = uniqueValues(records.map(record => record.value).filter(Boolean));
      const location = locationText(first) || '-';

      return {
        ...visit,
        openByDefault,
        records,
        chronologicalRecords,
        first,
        last,
        pages,
        modules,
        inputs,
        location,
        pageViews: records.filter(record => record.event === 'page_view').length,
        accesses: records.filter(record => record.event !== 'page_view').length,
      };
    }

    function getSelectedRecordForVisit(visit) {
      if (!visit.records.length) return null;
      const explicit = visit.records.find(record => recordId(record) === state.selectedRecordId);
      if (explicit) return explicit;
      return null;
    }

    function renderHighlightCard(title, content, variant, idleText) {
      const isIdle = !safeText(content).trim();
      return `
        <article class="highlight-card ${variant} ${isIdle ? 'idle' : ''}">
          <span class="highlight-title">${escapeHtml(title)}</span>
          <div class="highlight-content">${escapeHtml(isIdle ? '' : content)}</div>
        </article>
      `;
    }

    function renderMetrics(visits) {
      const totalRecords = visits.reduce((sum, visit) => sum + visit.records.length, 0);
      const totalInputs = visits.reduce((sum, visit) => sum + visit.inputs.length, 0);
      const cards = [
        { label: 'Visitas', value: visits.length, note: 'Blocos separados por usuario e intervalo' },
        { label: 'Eventos', value: totalRecords, note: 'Registros no recorte atual' },
        { label: 'Paginas vistas', value: visits.reduce((sum, visit) => sum + visit.pageViews, 0), note: 'Visualizacoes somadas' },
        { label: 'Acessos', value: visits.reduce((sum, visit) => sum + visit.accesses, 0), note: 'Modulos, buscas e configuracoes' },
        { label: 'Entradas', value: totalInputs, note: 'Textos digitados detectados' },
      ];

      el.metrics.innerHTML = cards.map(card => `
        <article class="metric">
          <span class="metric-label">${escapeHtml(card.label)}</span>
          <div class="metric-value">${card.value}</div>
          <div class="metric-note">${escapeHtml(card.note)}</div>
        </article>
      `).join('');
    }

    function renderVisits(visits) {
      if (!visits.length) {
        el.visitWrap.innerHTML = '<div class="empty">Nenhuma visita encontrada.</div>';
        return;
      }

      el.visitWrap.innerHTML = visits.map((visit, index) => {
        const inputPreview = visit.inputs.length
          ? visit.inputs.slice(0, 3).map(value => `<div class="preview">${escapeHtml(value)}</div>`).join('')
          : '<div class="preview">Sem conteudo digitado nesta visita.</div>';
        const selectedRecord = getSelectedRecordForVisit(visit);
        const selectedMeta = selectedRecord?.meta && typeof selectedRecord.meta === 'object' ? selectedRecord.meta : {};
        const questionText = selectedRecord?.value || '';
        const answerText = selectedMeta?.response_text || selectedMeta?.commentary_response || '';
        const paramsText = summarizeMeta(selectedMeta).join('\n');
        const findingsText = buildCountsSummary(selectedMeta);

        const timelineRows = visit.records.map(record => `
          <tr>
            <td>
              <button
                type="button"
                class="info-button ${hasExtraInfo(record) ? 'has-extra' : ''} ${recordId(record) === state.selectedRecordId ? 'active' : ''}"
                data-record-id="${escapeHtml(recordId(record))}"
                title="${hasExtraInfo(record) ? 'Mostrar detalhes desta linha' : 'Sem detalhes extras'}"
              >i</button>
            </td>
            <td class="mono">${formatDate(record._server_ts, true)}</td>
            <td><span class="pill ${eventTypeClass(record)}">${eventTypeLabel(record)}</span></td>
            <td>${escapeHtml(record.page_label || record.page || '-')}</td>
            <td class="content-cell">${escapeHtml(record.value || '-')}</td>
            <td>${escapeHtml(locationText(record) || '-')}</td>
            <td class="mono">${escapeHtml(record._client_ip || '-')}</td>
          </tr>
        `).join('');

        return `
          <details class="visit" ${visit.openByDefault ? 'open' : ''}>
            <summary>
              <div class="visit-header">
                <div class="visit-title">
                  <span class="badge">${index + 1}</span>
                    <div>
                      <div class="visit-name">${escapeHtml(normalizeUserLabel(visit.first))}</div>
                    <div class="visit-sub">${escapeHtml(formatDate(visit.last._server_ts, true))} ate ${escapeHtml(formatDate(visit.first._server_ts, true))}</div>
                    </div>
                </div>
                <div class="visit-meta">
                  <span class="section-label">Resumo</span>
                  <div class="chips">
                    <span class="chip">${visit.records.length} eventos</span>
                    <span class="chip">${visit.pageViews} paginas</span>
                    <span class="chip">${visit.accesses} acessos</span>
                  </div>
                </div>
                <div class="visit-pages">
                  <span class="section-label">Paginas e modulos</span>
                  <div class="chips">
                    ${visit.pages.slice(0, 4).map(page => `<span class="chip">${escapeHtml(page)}</span>`).join('')}
                    ${visit.modules.slice(0, 4).map(module => `<span class="chip">${escapeHtml(module)}</span>`).join('')}
                  </div>
                </div>
                <div class="visit-inputs">
                  <span class="section-label">Conteudo inserido</span>
                  ${inputPreview}
                </div>
              </div>
            </summary>
            <div class="visit-highlights">
              ${renderHighlightCard('Pergunta / entrada', questionText, 'question', 'Selecione uma linha com icone para ver a entrada.')}
              ${renderHighlightCard('Resposta final', answerText, 'answer', 'Selecione uma linha que tenha resposta final registrada.')}
              ${renderHighlightCard('Parametros', paramsText, 'params', 'Selecione uma linha com parametros extras.')}
              ${renderHighlightCard('Achados por fonte', findingsText, 'findings', 'Selecione uma linha com contagem por fonte.')}
            </div>
            <div class="timeline">
              <table>
                <thead>
                  <tr>
                    <th>Info</th>
                    <th>Horario</th>
                    <th>Tipo</th>
                    <th>Pagina</th>
                    <th>Conteudo</th>
                    <th>Local</th>
                    <th>IP</th>
                  </tr>
                </thead>
                <tbody>${timelineRows}</tbody>
              </table>
            </div>
          </details>
        `;
      }).join('');
    }

    function render() {
      const visits = buildVisits(filteredRecords());
      renderMetrics(visits);
      renderVisits(visits);
      el.listCopy.textContent = `${visits.length} visitas agrupadas a partir de ${state.records.length} registros carregados.`;
    }

    async function fetchLogs() {
      const url = `/logs?format=json&limit=${encodeURIComponent(state.limit)}`;
      el.listCopy.textContent = 'Atualizando...';
      try {
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        state.records = Array.isArray(payload.records) ? payload.records : [];
        state.summary = payload.summary || {};
        render();
      } catch (error) {
        el.visitWrap.innerHTML = `<div class="empty">Falha ao carregar logs: ${escapeHtml(error.message || error)}</div>`;
        el.listCopy.textContent = 'Falha ao atualizar.';
      }
    }

    async function clearAll() {
      if (!window.confirm('Limpar todos os logs?')) return;
      try {
        const response = await fetch('/logs/clear_all', { method: 'DELETE' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        await fetchLogs();
      } catch (error) {
        el.listCopy.textContent = `Falha ao limpar: ${escapeHtml(error.message || error)}`;
      }
    }

    el.searchInput.addEventListener('input', event => {
      state.filter = event.target.value || '';
      render();
    });

    el.typeFilter.addEventListener('change', event => {
      state.type = event.target.value;
      render();
    });

    el.limitFilter.addEventListener('change', event => {
      state.limit = parseInt(event.target.value, 10) || 800;
      fetchLogs();
    });

    el.gapFilter.addEventListener('change', event => {
      state.gapMinutes = parseInt(event.target.value, 10) || 30;
      render();
    });

    el.refreshButton.addEventListener('click', fetchLogs);
    el.clearButton.addEventListener('click', clearAll);
    el.visitWrap.addEventListener('click', event => {
      const button = event.target.closest('[data-record-id]');
      if (!button) return;
      const id = button.getAttribute('data-record-id') || '';
      state.selectedRecordId = state.selectedRecordId === id ? '' : id;
      render();
    });

    fetchLogs();
    setInterval(fetchLogs, 15000);
  </script>
</body>
</html>
