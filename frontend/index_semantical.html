<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantical Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button" title="Back to Home">
            <i class="fas fa-home"></i>
        </a>
        
        <h1>Semantical Search</h1>
        
        <div class="search-container">
            <div class="search-input-group">
                <input type="text" id="searchInput" placeholder="Enter a term, subject or phrase to search..." class="search-input">
                <button id="searchButton" class="search-button">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            
            <div class="download-buttons" style="display: none;">
                <!-- <button id="downloadMd" class="download-btn">
                    <i class="fas fa-file-alt"></i> Download as Markdown
                </button> -->
                <button id="downloadDocx" class="download-btn">
                    <i class="fas fa-file-word"></i> Download as Word
                </button>
                
                <button id="btn-new-conv" class="btn btn-quaternary" style="margin-left: 8px;">
                    Nova conversa
                </button>

            </div>        
        </div>
        
        <div id="results" class="results">
            <!-- Results will be displayed here -->
        </div>
        
    </div>
    
   <!-- CSS opcional para realce de código (highlight.js) -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">

   <!-- Dependências JS -->
   <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

   <!-- Seus scripts -->
   <script src="utils.js"></script>
   <script src="display.js"></script>
    <!-- Add the semantical search script -->
    <script src="script_semantical.js"></script>
</body>
</html>
