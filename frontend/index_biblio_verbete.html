<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Bibliografia de Verbetes ● Cons-AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="icon" type="image/png" href="/Icon.png">
    <style>
      .biblio-form {
        display: grid;
        gap: 12px;
        margin: 0 auto 16px;
        justify-items: center;
      }
      .biblio-copy {
        width: 100%;
        max-width: 780px;
        margin: 0 auto 8px;
        text-align: center;
      }
      .biblio-copy h3 {
        margin: 0;
        font-size: var(--text-base);
      }
      .biblio-copy p {
        margin: 6px 0 0;
        color: var(--gray-600);
        font-size: var(--text-sm);
      }
      .biblio-field-label { font-size: var(--text-xs); font-weight: 600; color: var(--gray-700); }
      .biblio-pages-label {
        display: block;
        width: 40ch;
        max-width: 100%;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .biblio-types {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        width: 46ch;
        max-width: 100%;
        justify-content: center;
        margin: 0 auto;
      }
      #styleContainer .search-type-pill.active {
        background: #a5a5a5;
        color: rgb(255, 255, 155);
      }
      .biblio-pages-input {
        width: 46ch;
        max-width: 100%;
        min-height: 0;
        border-radius: 8px;
        border: 1px solid var(--gray-200);
        padding: 10px 12px;
        font-family: inherit;
        font-size: var(--text-sm);
        resize: none;
        overflow-y: hidden;
        background: var(--white);
        color: var(--gray-900);
      }
      .biblio-pages-input:focus,
      .biblio-pages-input:focus-visible {
        outline: none;
        border-color: var(--module-accent, var(--apps-primary));
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--module-accent, var(--apps-primary)) 18%, transparent);
      }
      .biblio-pages-input,
      .biblio-help,
      .biblio-copy p,
      .biblio-field-label {
        font-size: var(--text-sm);
      }
      [data-theme="dark"] .biblio-pages-input {
        background: var(--gray-800);
        color: var(--gray-50);
        border-color: var(--gray-600);
      }
      .biblio-help {
        margin-top: 6px;
        max-width: 46ch;
        color: var(--gray-600);
        font-size: var(--text-xs);
      }
      .biblio-status { font-size: var(--text-xs); color: var(--gray-600); text-align: center; }
      [data-theme="dark"] .biblio-copy p,
      [data-theme="dark"] .biblio-help,
      [data-theme="dark"] .biblio-status {
        color: var(--gray-300);
      }
      #results .title-box {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-3) var(--space-4);
        border-radius: var(--radius-xl);
        border: 1px solid var(--module-accent, var(--gray-200));
        background: var(--gray-200);
        color: var(--gray-700);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.7),
          0 1px 2px rgba(0,0,0,0.08),
          0 2px 4px rgba(0,0,0,0.04);
        background-image: linear-gradient(to bottom, rgba(255,255,255,0.6), rgba(255,255,255,0));
      }
      #results .title-box .title-box-heading {
        color: var(--gray-700);
        font-size: var(--text-base);
        font-weight: 700;
        line-height: 1.2;
      }
      @media (min-width: 1200px) {
        .biblio-pages-input {
          font-size: var(--text-base);
        }
        .biblio-help,
        .biblio-copy p,
        .biblio-field-label {
          font-size: var(--text-base);
        }
      }
      @media (max-width: 480px) {
        #results .title-box .title-box-heading {
          font-size: var(--text-xs);
          line-height: 1.2;
        }
        #results .displaybox-text.markdown-content p,
        #results .displaybox-text.markdown-content li,
        #results .displaybox-text.markdown-content ul,
        #results .displaybox-text.markdown-content ol {
          font-size: var(--text-xs);
          line-height: 1.2;
        }
      }
    </style>
</head>

<body class="theme-apps">
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-controls">
                <a href="index.html" class="back-button" title="Back to Home">
                    <i class="fas fa-home"></i>
                </a>
            </div>

            <div class="navbar-center">
                <div class="navbar-text">
                    <div class="navbar-title-modules">Bibliografia Verbetes</div>
                    <div class="navbar-subtitle-modules">Verbetes da Enciclopédia</div>
                </div>
            </div>

            <div class="navbar-controls">
                <button class="navbar-control-btn theme-toggle" title="Toggle Theme" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- <div class="biblio-copy">
          <h3>Bibliografia de Verbetes</h3>
          <p>Informe os verbetes para gerar separadamente a listagem e a bibliografia consolidada.</p>
        </div> -->

        <div class="action-container">
            <button id="insertVerbeteButton" class="pensata-button" type="button" disabled>
              <i class="fas fa-list"></i>
              Bibliografia
            </button>
            <p class="action-hint">Lista os dados e monta bibliografia para os verbetes informados.</p>
        </div>

        <div class="biblio-form">
          <div>
            <label class="biblio-field-label biblio-pages-label" for="verbetesInput">Títulos dosVerbetes</label>
            <!-- <p class="biblio-help">Nomes dos verbetes separados por virgula, ponto-e-virgula ou quebra de linha.</p> -->
            <textarea id="verbetesInput" class="biblio-pages-input" rows="5" placeholder="Digite os títulos dos verbetes separados por virgula, ponto-e-virgula ou quebra de linha..."></textarea>
          </div>
          <div>
            <!--<label class="biblio-field-label biblio-pages-label" for="styleContainer">Tipo de Bibliografia</label>-->
            <div class="biblio-types" id="styleContainer">
              <div class="search-type-pill active" data-style="simples">Simplificada</div>
              <div class="search-type-pill" data-style="bee">BEE</div>
            </div>
          </div>
        </div>

        <div id="results" class="results"></div>

        <div class="biblio-form">
          <div id="biblioStatus" class="biblio-status"></div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="display.js"></script>
    <script src="bridge.js"></script>
    <script src="script_biblio_verbete.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', initTheme);
    </script>
</body>
</html>
